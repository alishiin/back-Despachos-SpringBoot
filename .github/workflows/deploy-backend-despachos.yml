name: Build and Push Backend Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST-DESPACHO
          dockerfile: ./Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:latest
            ${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_BACKEND_DESPACHOS }} # La IP PÃºblica de la 3ra EC2
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:latest
            sudo docker stop back-despachos  true
            sudo docker rm back-despachos  true
            sudo docker run -d --name back-despachos -p 8081:8080 ${{ secrets.DOCKER_HUB_REPO_BACKEND_DESPACHOS }}:latest